<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Retirar Fondos — Punto Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles.css">
  <script src="../auth.js"></script>
  <style>
    body { background: #f3f4f6; font-family: var(--pp-font, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif); color: var(--pp-text, #171717); }
    .card-container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .nav-header { padding-top: calc(env(safe-area-inset-top, 0px) + 1rem); }
    .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="min-h-screen">
  
  <nav class="bg-[#0047bb] text-white shadow-md sticky top-0 z-40 nav-header pb-4 px-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="recharge.html" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 transition-colors">
          <i class="fas fa-arrow-left"></i>
        </a>
        <h1 class="font-extrabold text-lg">Retiro de fondos</h1>
      </div>
      <!-- Right: session (optional) -->
      <div class="hidden sm:block text-xs text-white/80">
        <span data-pp-session></span>
      </div>
    </div>
  </nav>

  <main class="card-container pb-12">
    <!-- Calculator / Balance Card -->
    <div class="glass-panel rounded-3xl shadow-sm border border-gray-100 p-6 mb-6 mt-4">
      <div class="text-center mb-6">
        <div class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-1">Fondos Disponibles</div>
        <div class="text-4xl font-black text-gray-900 tracking-tight" id="total-balance">$1,250.45</div>
        <div class="inline-flex items-center gap-1.5 mt-3 px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold">
          <i class="fas fa-arrow-trend-up"></i>
          <span>Ganancias por comisiones (Mes): <strong id="profit-calc">$42.80</strong></span>
        </div>
      </div>
    </div>

    <!-- Bank Account Section -->
    <div class="glass-panel rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-6">
      <div class="px-6 py-5 border-b border-gray-50 flex items-center justify-between">
        <h2 class="text-lg font-bold">Cuenta de destino</h2>
        <i class="fas fa-building-columns text-gray-300 text-xl"></i>
      </div>
      
      <div class="p-6">
        <!-- State: No bank account linked -->
        <div id="no-bank-state" class="text-center py-4">
          <div class="w-16 h-16 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
            <i class="fas fa-wallet"></i>
          </div>
          <p class="text-gray-500 text-sm mb-5">Elige un método para retirar tus ganancias y saldo a favor.</p>
          <div class="space-y-3">
            <button type="button" id="btn-add-bank" class="w-full flex items-center justify-center border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 text-gray-800 font-bold py-3.5 rounded-xl transition-all">
              <i class="fas fa-building-columns mr-2 text-blue-600"></i> Cuenta Bancaria
            </button>
            <button type="button" id="btn-add-card" class="w-full flex items-center justify-center border-2 border-gray-200 hover:border-orange-500 hover:bg-orange-50 text-gray-800 font-bold py-3.5 rounded-xl transition-all">
              <i class="fas fa-credit-card mr-2 text-orange-500"></i> Tarjeta Punto Pago
            </button>
          </div>
        </div>

        <!-- State: Bank account exists -->
        <div id="has-bank-state" class="hidden">
          <div class="flex items-center p-4 border border-blue-100 bg-blue-50/50 rounded-2xl" id="method-container-bg">
            <div class="w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-blue-600 text-xl mr-4 shrink-0 border border-gray-100" id="method-icon-wrap">
              <i class="fas fa-piggy-bank" id="method-icon"></i>
            </div>
            <div class="min-w-0 flex-1">
              <div class="font-bold text-gray-900 truncate" id="bank-name-display">Banco General</div>
              <div class="text-sm text-gray-500 truncate mt-0.5"><span id="bank-type-display">Ahorros</span> •••• <span id="bank-number-display">1234</span></div>
            </div>
            <button id="btn-edit-bank" class="text-blue-600 hover:text-blue-800 p-2 font-bold text-sm">Cambiar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Cashout Action -->
    <div id="cashout-action-section" class="glass-panel rounded-3xl shadow-sm border border-gray-100 p-6 hidden opacity-0 transition-opacity duration-500">
      <label class="block text-sm font-bold text-gray-700 mb-2">Monto a retirar</label>
      <div class="relative mb-6">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-xl">$</span>
        <input type="number" id="cashout-amount" class="w-full pl-9 pr-4 py-4 rounded-xl border-2 border-gray-200 focus:border-[#0047bb] focus:ring-4 focus:ring-blue-100 font-black text-2xl outline-none transition-all" placeholder="0.00" step="0.01">
        <button id="btn-max-amount" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold bg-gray-100 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-200">MAX</button>
      </div>

      <button id="btn-submit-cashout" class="w-full text-center py-4 bg-[#0047bb] text-white font-extrabold rounded-xl shadow-lg opacity-50 cursor-not-allowed transition-all" disabled>
        Transferir fondos a mi cuenta
      </button>
      <p class="text-xs text-center text-gray-400 mt-3 font-medium"><i class="fas fa-info-circle mr-1"></i> Retiros ACH toman de 24 a 48 hs hábiles.</p>
    </div>

  </main>

  <!-- ADD BANK MODAL (Overlay) -->
  <div id="bank-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" id="bank-modal-bg"></div>
    <div class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 ease-out flex flex-col max-h-[90vh]" id="bank-modal-sheet">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 class="text-xl font-extrabold">Datos Bancarios</h3>
        <button type="button" id="close-bank-modal" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-6 overflow-y-auto space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Banco de destino</label>
          <select id="input-bank-name" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 bg-white font-medium">
            <option value="">Seleccione banco...</option>
            <option value="Banco General">Banco General</option>
            <option value="Banistmo">Banistmo</option>
            <option value="BAC Credomatic">BAC Credomatic</option>
            <option value="Global Bank">Global Bank</option>
            <option value="Caja de Ahorros">Caja de Ahorros</option>
            <option value="Banesco">Banesco</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Tipo de cuenta</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors [&:has(input:checked)]:border-blue-500 [&:has(input:checked)]:bg-blue-50/50">
              <input type="radio" name="bank-type" value="Ahorros" class="sr-only" checked>
              <span class="font-semibold text-gray-700">Ahorros</span>
            </label>
            <label class="relative flex items-center justify-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors [&:has(input:checked)]:border-blue-500 [&:has(input:checked)]:bg-blue-50/50">
              <input type="radio" name="bank-type" value="Corriente" class="sr-only" >
              <span class="font-semibold text-gray-700">Corriente</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Número de cuenta</label>
          <input type="number" id="input-bank-number" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 font-bold tracking-widest outline-none" placeholder="0000000000" inputmode="numeric">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Titular de la cuenta</label>
          <input type="text" id="input-bank-owner" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 font-medium outline-none" placeholder="Nombre completo">
        </div>

        <button type="button" id="save-bank-btn" class="w-full mt-4 py-4 bg-gray-900 text-white font-bold rounded-xl shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors" disabled>
          Guardar cuenta
        </button>
      </div>
    </div>
  </div>

  <!-- ADD CARD MODAL (Overlay) -->
  <div id="card-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" id="card-modal-bg"></div>
    <div class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 ease-out flex flex-col max-h-[90vh]" id="card-modal-sheet">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 class="text-xl font-extrabold flex items-center gap-2"><i class="fas fa-credit-card text-orange-500"></i> Tarjeta Punto Pago</h3>
        <button type="button" id="close-card-modal" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200"><i class="fas fa-times"></i><span class="sr-only">Cerrar</span></button>
      </div>
      <div class="p-6 overflow-y-auto space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Número de tarjeta</label>
          <input type="text" id="input-card-number" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 font-bold tracking-widest outline-none" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Nombre en la tarjeta</label>
          <input type="text" id="input-card-owner" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 font-medium outline-none" placeholder="Nombre completo">
        </div>
        <div class="w-1/2">
          <label class="block text-sm font-bold text-gray-700 mb-1.5">Vencimiento</label>
          <input type="text" id="input-card-expiry" class="w-full px-4 py-3.5 rounded-xl border border-gray-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 font-medium outline-none" placeholder="MM/AA" maxlength="5">
        </div>

        <button type="button" id="save-card-btn" class="w-full mt-4 py-4 bg-gray-900 text-white font-bold rounded-xl shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors" disabled>
          Vincular tarjeta
        </button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      // Initialize basic state and display data
      const config = {
        totalBalance: 1250.45,
        profitBalance: 42.80
      };
      
      const els = {
        noBank: document.getElementById('no-bank-state'),
        hasBank: document.getElementById('has-bank-state'),
        bankNameDisp: document.getElementById('bank-name-display'),
        bankTypeDisp: document.getElementById('bank-type-display'),
        bankNumDisp: document.getElementById('bank-number-display'),
        methodIcon: document.getElementById('method-icon'),
        methodIconWrap: document.getElementById('method-icon-wrap'),
        methodContainerBg: document.getElementById('method-container-bg'),
        cashoutSection: document.getElementById('cashout-action-section'),
        amountInput: document.getElementById('cashout-amount'),
        maxBtn: document.getElementById('btn-max-amount'),
        submitBtn: document.getElementById('btn-submit-cashout')
      };

      let savedMethod = null;
      try {
        savedMethod = JSON.parse(localStorage.getItem('pp_agent_cashout_method_v2'));
        if (!savedMethod) {
            // fallback
            const oldBank = JSON.parse(localStorage.getItem('pp_agent_bank_v1'));
            if (oldBank) savedMethod = { type: 'bank', data: oldBank };
        }
      } catch(e){}

      function renderState() {
        if (savedMethod && savedMethod.data) {
          els.noBank.classList.add('hidden');
          els.hasBank.classList.remove('hidden');
          els.cashoutSection.classList.remove('hidden');
          setTimeout(() => els.cashoutSection.classList.remove('opacity-0'), 50);

          if (savedMethod.type === 'card') {
            els.bankNameDisp.textContent = "Tarjeta Punto Pago";
            els.bankTypeDisp.textContent = "Prepagada";
            els.bankNumDisp.textContent = savedMethod.data.number.slice(-4);
            els.methodIcon.className = "fas fa-credit-card";
            els.methodIconWrap.className = "w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-orange-500 text-xl mr-4 shrink-0 border border-gray-100";
            els.methodContainerBg.className = "flex items-center p-4 border border-orange-100 bg-orange-50/50 rounded-2xl";
          } else {
            els.bankNameDisp.textContent = savedMethod.data.bankName;
            els.bankTypeDisp.textContent = savedMethod.data.type;
            els.bankNumDisp.textContent = savedMethod.data.number.slice(-4);
            els.methodIcon.className = "fas fa-piggy-bank";
            els.methodIconWrap.className = "w-12 h-12 bg-white rounded-xl shadow-sm flex items-center justify-center text-blue-600 text-xl mr-4 shrink-0 border border-gray-100";
            els.methodContainerBg.className = "flex items-center p-4 border border-blue-100 bg-blue-50/50 rounded-2xl";
          }
        } else {
          els.noBank.classList.remove('hidden');
          els.hasBank.classList.add('hidden');
          els.cashoutSection.classList.add('hidden');
          els.cashoutSection.classList.add('opacity-0');
        }
        validateAmount();
      }

      function validateAmount() {
        if (!savedMethod) return;
        const val = parseFloat(els.amountInput.value) || 0;
        if (val > 0 && val <= config.totalBalance) {
          els.submitBtn.disabled = false;
          els.submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          els.submitBtn.classList.add('hover:bg-blue-800', 'hover:shadow-xl');
        } else {
          els.submitBtn.disabled = true;
          els.submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
          els.submitBtn.classList.remove('hover:bg-blue-800', 'hover:shadow-xl');
        }
      }

      els.amountInput.addEventListener('input', validateAmount);
      els.maxBtn.addEventListener('click', () => {
        els.amountInput.value = config.totalBalance.toFixed(2);
        validateAmount();
      });

      els.submitBtn.addEventListener('click', () => {
        const amt = parseFloat(els.amountInput.value);
        const btn = els.submitBtn;
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Procesando retiro...`;
        
        // fake api call
        setTimeout(() => {
          btn.classList.replace('bg-[#0047bb]', 'bg-emerald-600');
          btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> ¡Retiro completado!`;
          // deduct offline for visual feedback
          document.getElementById('total-balance').textContent = '$' + (config.totalBalance - amt).toFixed(2);
          
          let destName = savedMethod.type === 'card' ? "Tarjeta Punto Pago" : savedMethod.data.bankName;
          
          setTimeout(() => {
            alert(`Felicidades, se enviaron $${amt.toFixed(2)} a tu ${destName} terminada en ${savedMethod.data.number.slice(-4)}.\nTiempo estimado: ${savedMethod.type === 'card' ? 'Inmediato' : '1 a 2 días hábiles'}.`);
            window.location.href = 'recharge.html';
          }, 1500);
        }, 2000);
      });

      // MODAL LOGIC FOR BANK
      const mBank = document.getElementById('bank-modal');
      const mBankBg = document.getElementById('bank-modal-bg');
      const mBankSheet = document.getElementById('bank-modal-sheet');

      function openBankModal() {
        mBank.classList.remove('hidden');
        if (savedMethod && savedMethod.type === 'bank') {
          document.getElementById('input-bank-name').value = savedMethod.data.bankName || '';
          document.getElementById('input-bank-number').value = savedMethod.data.number || '';
          document.getElementById('input-bank-owner').value = savedMethod.data.owner || '';
          const radios = document.getElementsByName('bank-type');
          for(let r of radios) { if(r.value === savedMethod.data.type) r.checked = true; }
        }
        validateBankModal();
        requestAnimationFrame(() => mBankSheet.classList.remove('translate-y-full'));
      }
      
      function closeBankModal() {
        mBankSheet.classList.add('translate-y-full');
        setTimeout(() => mBank.classList.add('hidden'), 300);
      }

      document.getElementById('btn-add-bank').addEventListener('click', openBankModal);
      document.getElementById('close-bank-modal').addEventListener('click', closeBankModal);
      mBankBg.addEventListener('click', closeBankModal);

      // Validate inputs inside bank modal
      const mBankInputs = ['input-bank-name', 'input-bank-number', 'input-bank-owner'];
      const mBankSaveBtn = document.getElementById('save-bank-btn');
      
      function validateBankModal() {
        const name = document.getElementById('input-bank-name').value;
        const num = document.getElementById('input-bank-number').value;
        const own = document.getElementById('input-bank-owner').value;
        if (name && num.length > 4 && own.length > 3) {
          mBankSaveBtn.disabled = false;
        } else {
          mBankSaveBtn.disabled = true;
        }
      }
      
      mBankInputs.forEach(id => document.getElementById(id).addEventListener('input', validateBankModal));
      document.getElementById('input-bank-name').addEventListener('change', validateBankModal);

      mBankSaveBtn.addEventListener('click', () => {
        let type = 'Ahorros';
        const radios = document.getElementsByName('bank-type');
        for(let r of radios){ if(r.checked) type = r.value; }
        
        savedMethod = {
          type: 'bank',
          data: {
            bankName: document.getElementById('input-bank-name').value,
            number: document.getElementById('input-bank-number').value,
            owner: document.getElementById('input-bank-owner').value,
            type: type
          }
        };
        localStorage.setItem('pp_agent_cashout_method_v2', JSON.stringify(savedMethod));
        
        mBankSaveBtn.innerHTML = `<i class="fas fa-check"></i> Guardado`;
        mBankSaveBtn.classList.replace('bg-gray-900', 'bg-emerald-600');
        
        setTimeout(() => {
          mBankSaveBtn.innerHTML = `Guardar cuenta`;
          mBankSaveBtn.classList.replace('bg-emerald-600', 'bg-gray-900');
          closeBankModal();
          renderState();
        }, 600);
      });

      // MODAL LOGIC FOR CARD
      const mCard = document.getElementById('card-modal');
      const mCardBg = document.getElementById('card-modal-bg');
      const mCardSheet = document.getElementById('card-modal-sheet');

      function openCardModal() {
        mCard.classList.remove('hidden');
        if (savedMethod && savedMethod.type === 'card') {
          document.getElementById('input-card-number').value = savedMethod.data.number || '';
          document.getElementById('input-card-owner').value = savedMethod.data.owner || '';
          document.getElementById('input-card-expiry').value = savedMethod.data.expiry || '';
        }
        validateCardModal();
        requestAnimationFrame(() => mCardSheet.classList.remove('translate-y-full'));
      }
      
      function closeCardModal() {
        mCardSheet.classList.add('translate-y-full');
        setTimeout(() => mCard.classList.add('hidden'), 300);
      }

      document.getElementById('btn-add-card').addEventListener('click', openCardModal);
      document.getElementById('close-card-modal').addEventListener('click', closeCardModal);
      mCardBg.addEventListener('click', closeCardModal);

      // Simple formatting for card number
      document.getElementById('input-card-number').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(.{4})/g, '$1 ').trim();
        e.target.value = v;
        validateCardModal();
      });

      // Simple formatting for expiry date
      document.getElementById('input-card-expiry').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2,4);
        e.target.value = v;
        validateCardModal();
      });
      
      const mCardInputs = ['input-card-number', 'input-card-owner', 'input-card-expiry'];
      const mCardSaveBtn = document.getElementById('save-card-btn');
      
      function validateCardModal() {
        const num = document.getElementById('input-card-number').value.replace(/\D/g, '');
        const own = document.getElementById('input-card-owner').value;
        const exp = document.getElementById('input-card-expiry').value;
        if (num.length >= 15 && own.length > 3 && exp.length === 5) {
          mCardSaveBtn.disabled = false;
        } else {
          mCardSaveBtn.disabled = true;
        }
      }
      
      document.getElementById('input-card-owner').addEventListener('input', validateCardModal);

      mCardSaveBtn.addEventListener('click', () => {
        savedMethod = {
          type: 'card',
          data: {
            number: document.getElementById('input-card-number').value,
            owner: document.getElementById('input-card-owner').value,
            expiry: document.getElementById('input-card-expiry').value
          }
        };
        localStorage.setItem('pp_agent_cashout_method_v2', JSON.stringify(savedMethod));
        
        mCardSaveBtn.innerHTML = `<i class="fas fa-check"></i> Vinculada`;
        mCardSaveBtn.classList.replace('bg-gray-900', 'bg-orange-500');
        
        setTimeout(() => {
          mCardSaveBtn.innerHTML = `Vincular tarjeta`;
          mCardSaveBtn.classList.replace('bg-orange-500', 'bg-gray-900');
          closeCardModal();
          renderState();
        }, 600);
      });

      document.getElementById('btn-edit-bank').addEventListener('click', () => {
         // Determine which modal to open based on current method
         if (savedMethod && savedMethod.type === 'card') {
           openCardModal();
         } else {
           openBankModal();
         }
      });

      renderState();
    })();
  </script>
  <script src="../i18n.js"></script>
</body>
</html>
