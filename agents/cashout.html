<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Retirar Fondos — Punto Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../styles.css">
  <script src="../i18n.js?v=6"></script>
  <script src="../modules.config.js"></script>
  <script src="../auth.js"></script>
  <script src="../demo-context.js"></script>
  <style>
    body { background: var(--pp-page, #ffffff); font-family: var(--pp-font, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif); color: var(--pp-text, #171717); }
    .card-container { max-width: 720px; margin: 0 auto; padding: 24px 20px 48px; }
    .nav-header { padding-top: calc(env(safe-area-inset-top, 0px) + 1rem); }
    .pp-header-gradient { background: linear-gradient(135deg, var(--pp-primary), var(--pp-primary-900)); }
    .glass-panel { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); box-shadow: var(--pp-shadow-card); border: 1px solid rgba(0,0,0,.06); }
  </style>
</head>
<body class="min-h-screen">

  <nav class="pp-header-gradient text-white shadow-lg sticky top-0 z-40 nav-header pb-4 px-4">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="recharge.html" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-white/10 hover:bg-white/20 transition-colors border border-white/15" aria-label="Volver al portal de agentes">
          <i class="fas fa-arrow-left"></i>
        </a>
  <h1 class="font-extrabold text-lg tracking-tight text-white" data-i18n="cashout_title">Retiro de fondos</h1>
      </div>
      <!-- Right: session (optional) -->
      <div class="hidden sm:block text-xs text-white/80">
        <span data-pp-session></span>
      </div>
    </div>
  </nav>

  <main class="card-container pb-12">
    <!-- Calculator / Balance Card -->
    <div class="glass-panel rounded-3xl shadow-sm border border-gray-100 p-6 mb-6 mt-4">
      <div class="text-center mb-6">
        <div class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-1" data-i18n="cashout_available_funds">Fondos Disponibles</div>
        <div class="text-4xl font-black text-gray-900 tracking-tight" id="total-balance">$1,250.45</div>
        <div class="inline-flex items-center gap-1.5 mt-3 px-3 py-1.5 bg-emerald-50 text-emerald-700 rounded-full text-xs font-bold">
          <i class="fas fa-arrow-trend-up"></i>
          <span><span data-i18n="cashout_profit_label">Ganancias por comisiones (Mes):</span> <strong id="profit-calc">$42.80</strong></span>
        </div>
      </div>
    </div>

    <!-- Bank Account Section -->
    <div class="glass-panel rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-6">
      <div class="px-6 py-5 border-b border-gray-50 flex items-center justify-between">
        <h2 class="text-lg font-bold" data-i18n="cashout_target_account">Cuenta de destino</h2>
        <i class="fas fa-building-columns text-gray-300 text-xl"></i>
      </div>

      <div class="p-6">
        <!-- State: No bank account linked -->
        <div id="no-bank-state" class="text-center py-4">
          <div class="w-16 h-16 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center text-2xl mx-auto mb-4">
            <i class="fas fa-wallet"></i>
          </div>
          <p class="text-gray-500 text-sm mb-5"><span data-i18n="cashout_choose_method">Elige un método para retirar tus ganancias y saldo a favor.</span></p>
          <div class="space-y-3">
            <button type="button" id="btn-add-bank" class="pp-btn pp-btn-secondary w-full justify-center gap-2 border border-[rgba(84,98,230,.18)] bg-white text-[var(--pp-text)] hover:border-[rgba(84,98,230,.38)] hover:bg-[rgba(84,98,230,.06)] rounded-[24px] px-5 py-3.5 shadow-sm transition-all">
              <i class="fas fa-building-columns text-[var(--pp-primary)]"></i><span data-i18n="cashout_origin_account">Cuenta Bancaria</span>
            </button>
            <button type="button" id="btn-add-card" class="pp-btn pp-btn-secondary w-full justify-center border border-[rgba(84,98,230,.18)] bg-white text-[var(--pp-text)] hover:border-[rgba(84,98,230,.38)] hover:bg-[rgba(84,98,230,.06)] rounded-[24px] px-5 py-3.5 shadow-sm transition-all">
              <i class="fas fa-credit-card text-[var(--pp-primary)]"></i> <span data-i18n="cashout_pp_card">Tarjeta Punto Pago</span>
            </button>
          </div>
        </div>

        <!-- State: Bank account exists -->
        <div id="has-bank-state" class="hidden">
          <div class="flex flex-col gap-4 p-4 border border-[rgba(84,98,230,.14)] bg-[rgba(84,98,230,.08)] rounded-[24px] sm:flex-row sm:items-center" id="method-container-bg">
            <div class="w-12 h-12 bg-white rounded-[18px] shadow-sm flex items-center justify-center text-[var(--pp-primary)] text-xl mr-4 shrink-0 border border-gray-100" id="method-icon-wrap">
              <i class="fas fa-piggy-bank" id="method-icon"></i>
            </div>
            <div class="min-w-0 flex-1">
              <div class="font-bold text-gray-900 truncate" id="bank-name-display">Banco General</div>
              <div class="text-sm text-gray-500 truncate mt-0.5"><span id="bank-type-display">Ahorros</span> •••• <span id="bank-number-display">1234</span></div>
            </div>
            <button id="btn-edit-bank" type="button" class="pp-btn pp-btn-secondary h-10 w-full justify-center rounded-[18px] px-3 text-sm font-bold sm:w-auto" data-i18n="cashout_change_method">Cambiar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Cashout Action -->
    <div id="cashout-action-section" class="glass-panel rounded-3xl shadow-sm border border-gray-100 p-6 hidden opacity-0 transition-opacity duration-500">
      <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="cashout_withdraw">Monto a retirar</label>
      <div class="relative mb-6">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-xl">$</span>
        <input type="number" id="cashout-amount" class="w-full pl-9 pr-20 py-4 rounded-[24px] border-2 border-gray-200 focus:border-[color:var(--pp-primary)] focus:ring-4 focus:ring-[rgba(84,98,230,.14)] font-black text-2xl outline-none transition-all" placeholder="0.00" step="0.01">
        <button id="btn-max-amount" type="button" class="pp-btn pp-btn-secondary absolute right-3 top-1/2 h-9 -translate-y-1/2 rounded-[14px] bg-gray-100 px-3 py-0 text-xs font-bold text-gray-600 hover:bg-gray-200" data-i18n="cashout_btn_max">MAX</button>
      </div>

      <button id="btn-submit-cashout" type="button" class="pp-btn pp-btn-primary w-full justify-center py-4 text-center font-extrabold shadow-lg opacity-50 cursor-not-allowed transition-all" disabled data-i18n="cashout_transfer_funds">Transferir fondos a mi cuenta</button>
      <div class="mt-4 flex items-start gap-3 rounded-[20px] bg-gray-50 px-4 py-3 text-left text-xs text-gray-500">
        <i class="fas fa-info-circle mt-0.5 text-[var(--pp-primary)]"></i>
        <span data-i18n="cashout_ach_info">Retiros ACH toman de 24 a 48 hs hábiles.</span>
      </div>
    </div>

  </main>

  <!-- ADD BANK MODAL (Overlay) -->
  <div id="bank-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" id="bank-modal-bg"></div>
    <div class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 ease-out flex flex-col max-h-[90vh]" id="bank-modal-sheet">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
        <h3 class="text-xl font-extrabold" data-i18n="cashout_bank_data">Datos Bancarios</h3>
  <button type="button" id="close-bank-modal" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200"><i class="fas fa-times"></i><span class="sr-only">Cerrar</span></button>
      </div>
      <div class="p-6 overflow-y-auto space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_destination_account">Banco de destino</label>
          <select id="input-bank-name" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-medium">
            <option value="" data-i18n="cashout_select_bank">Seleccione banco...</option>
            <option value="Banco General">Banco General</option>
            <option value="Banistmo">Banistmo</option>
            <option value="BAC Credomatic">BAC Credomatic</option>
            <option value="Global Bank">Global Bank</option>
            <option value="Caja de Ahorros">Caja de Ahorros</option>
            <option value="Banesco">Banesco</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_account_type">Tipo de cuenta</label>
          <div class="grid grid-cols-2 gap-3">
            <label class="relative flex items-center justify-center rounded-[20px] border-2 border-gray-200 p-3 cursor-pointer transition-colors hover:bg-gray-50 [&:has(input:checked)]:border-[color:var(--pp-primary)] [&:has(input:checked)]:bg-[rgba(84,98,230,.08)]">
              <input type="radio" name="bank-type" value="Ahorros" class="sr-only" checked>
              <span class="font-semibold text-gray-700" data-i18n="cashout_savings">Ahorros</span>
            </label>
            <label class="relative flex items-center justify-center rounded-[20px] border-2 border-gray-200 p-3 cursor-pointer transition-colors hover:bg-gray-50 [&:has(input:checked)]:border-[color:var(--pp-primary)] [&:has(input:checked)]:bg-[rgba(84,98,230,.08)]">
              <input type="radio" name="bank-type" value="Corriente" class="sr-only" >
              <span class="font-semibold text-gray-700" data-i18n="cashout_checking">Corriente</span>
            </label>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_account_number">Número de cuenta</label>
          <input type="number" id="input-bank-number" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-bold tracking-widest" placeholder="0000000000" inputmode="numeric">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_account_owner">Titular de la cuenta</label>
          <input type="text" id="input-bank-owner" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-medium" placeholder="Nombre completo" data-i18n-ph="cashout_ph_name">
        </div>

        <button type="button" id="save-bank-btn" class="pp-btn pp-btn-primary w-full mt-4 justify-center py-4 shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
          <span data-i18n="cashout_save_account">Guardar cuenta</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ADD CARD MODAL (Overlay) -->
  <div id="card-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-gray-900/60 backdrop-blur-sm" id="card-modal-bg"></div>
    <div class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-2xl transform translate-y-full transition-transform duration-300 ease-out flex flex-col max-h-[90vh]" id="card-modal-sheet">
      <div class="flex items-center justify-between p-6 border-b border-gray-100">
  <h3 class="text-xl font-extrabold flex items-center gap-2"><i class="fas fa-credit-card text-[var(--pp-primary)]"></i> <span data-i18n="cashout_pp_card">Tarjeta Punto Pago</span></h3>
        <button type="button" id="close-card-modal" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200"><i class="fas fa-times"></i><span class="sr-only">Cerrar</span></button>
      </div>
      <div class="p-6 overflow-y-auto space-y-5">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_card_number">Número de tarjeta</label>
          <input type="text" id="input-card-number" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-bold tracking-widest" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_card_name">Nombre en la tarjeta</label>
          <input type="text" id="input-card-owner" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-medium" placeholder="Nombre completo" data-i18n-ph="cashout_ph_name">
        </div>
        <div class="w-full sm:w-1/2">
          <label class="block text-sm font-bold text-gray-700 mb-1.5" data-i18n="cashout_card_expiry">Vencimiento</label>
          <input type="text" id="input-card-expiry" class="pp-field h-auto min-h-[54px] px-4 py-3.5 font-medium" placeholder="MM/AA" maxlength="5">
        </div>

        <button type="button" id="save-card-btn" class="pp-btn pp-btn-primary w-full mt-4 justify-center py-4 shadow-md disabled:bg-gray-300 disabled:cursor-not-allowed" disabled>
          <span data-i18n="cashout_link_card">Vincular tarjeta</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      // Initialize basic state and display data
      const config = {
        totalBalance: 1250.45,
        profitBalance: 42.80
      };

      const els = {
        noBank: document.getElementById('no-bank-state'),
        hasBank: document.getElementById('has-bank-state'),
        bankNameDisp: document.getElementById('bank-name-display'),
        bankTypeDisp: document.getElementById('bank-type-display'),
        bankNumDisp: document.getElementById('bank-number-display'),
        methodIcon: document.getElementById('method-icon'),
        methodIconWrap: document.getElementById('method-icon-wrap'),
        methodContainerBg: document.getElementById('method-container-bg'),
        cashoutSection: document.getElementById('cashout-action-section'),
        amountInput: document.getElementById('cashout-amount'),
        maxBtn: document.getElementById('btn-max-amount'),
        submitBtn: document.getElementById('btn-submit-cashout')
      };

      let savedMethod = null;
      function t(key, fallback) {
        try {
          const dict = window.I18N && window.I18N.getDict ? window.I18N.getDict() : null;
          return (dict && dict[key]) || fallback;
        } catch (e) {
          return fallback;
        }
      }
      try {
        savedMethod = JSON.parse(localStorage.getItem('pp_agent_cashout_method_v2'));
        if (!savedMethod) {
            // fallback
            const oldBank = JSON.parse(localStorage.getItem('pp_agent_bank_v1'));
            if (oldBank) savedMethod = { type: 'bank', data: oldBank };
        }
      } catch(e){}

      function renderState() {
        if (savedMethod && savedMethod.data) {
          els.noBank.classList.add('hidden');
          els.hasBank.classList.remove('hidden');
          els.cashoutSection.classList.remove('hidden');
          setTimeout(() => els.cashoutSection.classList.remove('opacity-0'), 50);

          if (savedMethod.type === 'card') {
            els.bankNameDisp.textContent = t('cashout_pp_card', 'Tarjeta Punto Pago');
            els.bankTypeDisp.textContent = t('cashout_prepaid', 'Prepagada');
            els.bankNumDisp.textContent = savedMethod.data.number.slice(-4);
            els.methodIcon.className = "fas fa-credit-card";
            els.methodIconWrap.className = "w-12 h-12 bg-white rounded-[18px] shadow-sm flex items-center justify-center text-[var(--pp-primary)] text-xl mr-4 shrink-0 border border-gray-100";
            els.methodContainerBg.className = "flex items-center p-4 border border-[rgba(84,98,230,.14)] bg-[rgba(84,98,230,.08)] rounded-[24px]";
          } else {
            els.bankNameDisp.textContent = savedMethod.data.bankName;
            els.bankTypeDisp.textContent = savedMethod.data.type;
            els.bankNumDisp.textContent = savedMethod.data.number.slice(-4);
            els.methodIcon.className = "fas fa-piggy-bank";
            els.methodIconWrap.className = "w-12 h-12 bg-white rounded-[18px] shadow-sm flex items-center justify-center text-[var(--pp-primary)] text-xl mr-4 shrink-0 border border-gray-100";
            els.methodContainerBg.className = "flex items-center p-4 border border-[rgba(84,98,230,.14)] bg-[rgba(84,98,230,.08)] rounded-[24px]";
          }
        } else {
          els.noBank.classList.remove('hidden');
          els.hasBank.classList.add('hidden');
          els.cashoutSection.classList.add('hidden');
          els.cashoutSection.classList.add('opacity-0');
        }
        validateAmount();
      }

      function validateAmount() {
        if (!savedMethod) return;
        const val = parseFloat(els.amountInput.value) || 0;
        if (val > 0 && val <= config.totalBalance) {
          els.submitBtn.disabled = false;
          els.submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          els.submitBtn.classList.add('hover:brightness-[1.02]', 'hover:shadow-xl');
        } else {
          els.submitBtn.disabled = true;
          els.submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
          els.submitBtn.classList.remove('hover:brightness-[1.02]', 'hover:shadow-xl');
        }
      }

      els.amountInput.addEventListener('input', validateAmount);
      els.maxBtn.addEventListener('click', () => {
        els.amountInput.value = config.totalBalance.toFixed(2);
        validateAmount();
      });

      els.submitBtn.addEventListener('click', () => {
        const amt = parseFloat(els.amountInput.value);
        const btn = els.submitBtn;
        btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> ${t('cashout_processing', 'Procesando retiro...')}`;

        // fake api call
        setTimeout(() => {
          btn.classList.replace('bg-[color:var(--pp-primary)]', 'bg-emerald-600');
          btn.innerHTML = `<i class="fas fa-check-circle mr-2"></i> ${t('cashout_done', '¡Retiro completado!')}`;
          // deduct offline for visual feedback
          document.getElementById('total-balance').textContent = '$' + (config.totalBalance - amt).toFixed(2);

          let destName = savedMethod.type === 'card' ? t('cashout_pp_card', 'Tarjeta Punto Pago') : savedMethod.data.bankName;

          setTimeout(() => {
            alert(`${t('cashout_alert_sent', 'Felicidades, se enviaron')} $${amt.toFixed(2)} ${t('cashout_alert_to', 'a tu')} ${destName} ${t('cashout_alert_ending', 'terminada en')} ${savedMethod.data.number.slice(-4)}.\n${t('cashout_alert_eta', 'Tiempo estimado')}: ${savedMethod.type === 'card' ? t('cashout_eta_instant', 'Inmediato') : t('cashout_eta_bank', '1 a 2 días hábiles')}.`);
            window.location.href = 'recharge.html';
          }, 1500);
        }, 2000);
      });

      // MODAL LOGIC FOR BANK
      const mBank = document.getElementById('bank-modal');
      const mBankBg = document.getElementById('bank-modal-bg');
      const mBankSheet = document.getElementById('bank-modal-sheet');

      function openBankModal() {
        mBank.classList.remove('hidden');
        if (savedMethod && savedMethod.type === 'bank') {
          document.getElementById('input-bank-name').value = savedMethod.data.bankName || '';
          document.getElementById('input-bank-number').value = savedMethod.data.number || '';
          document.getElementById('input-bank-owner').value = savedMethod.data.owner || '';
          const radios = document.getElementsByName('bank-type');
          for(let r of radios) { if(r.value === savedMethod.data.type) r.checked = true; }
        }
        validateBankModal();
        requestAnimationFrame(() => mBankSheet.classList.remove('translate-y-full'));
      }

      function closeBankModal() {
        mBankSheet.classList.add('translate-y-full');
        setTimeout(() => mBank.classList.add('hidden'), 300);
      }

      document.getElementById('btn-add-bank').addEventListener('click', openBankModal);
      document.getElementById('close-bank-modal').addEventListener('click', closeBankModal);
      mBankBg.addEventListener('click', closeBankModal);

      // Validate inputs inside bank modal
      const mBankInputs = ['input-bank-name', 'input-bank-number', 'input-bank-owner'];
      const mBankSaveBtn = document.getElementById('save-bank-btn');

      function validateBankModal() {
        const name = document.getElementById('input-bank-name').value;
        const num = document.getElementById('input-bank-number').value;
        const own = document.getElementById('input-bank-owner').value;
        if (name && num.length > 4 && own.length > 3) {
          mBankSaveBtn.disabled = false;
        } else {
          mBankSaveBtn.disabled = true;
        }
      }

      mBankInputs.forEach(id => document.getElementById(id).addEventListener('input', validateBankModal));
      document.getElementById('input-bank-name').addEventListener('change', validateBankModal);

      mBankSaveBtn.addEventListener('click', () => {
  let type = t('cashout_savings', 'Ahorros');
        const radios = document.getElementsByName('bank-type');
        for(let r of radios){ if(r.checked) type = r.value; }

        savedMethod = {
          type: 'bank',
          data: {
            bankName: document.getElementById('input-bank-name').value,
            number: document.getElementById('input-bank-number').value,
            owner: document.getElementById('input-bank-owner').value,
            type: type
          }
        };
        localStorage.setItem('pp_agent_cashout_method_v2', JSON.stringify(savedMethod));

  mBankSaveBtn.innerHTML = `<i class="fas fa-check"></i> ${t('cashout_saved', 'Guardado')}`;
  mBankSaveBtn.classList.replace('bg-[color:var(--pp-primary)]', 'bg-emerald-600');

        setTimeout(() => {
          mBankSaveBtn.innerHTML = `<span data-i18n="cashout_save_account">Guardar cuenta</span>`;
          mBankSaveBtn.classList.replace('bg-emerald-600', 'bg-[color:var(--pp-primary)]');
          closeBankModal();
          renderState();
        }, 600);
      });

      // MODAL LOGIC FOR CARD
      const mCard = document.getElementById('card-modal');
      const mCardBg = document.getElementById('card-modal-bg');
      const mCardSheet = document.getElementById('card-modal-sheet');

      function openCardModal() {
        mCard.classList.remove('hidden');
        if (savedMethod && savedMethod.type === 'card') {
          document.getElementById('input-card-number').value = savedMethod.data.number || '';
          document.getElementById('input-card-owner').value = savedMethod.data.owner || '';
          document.getElementById('input-card-expiry').value = savedMethod.data.expiry || '';
        }
        validateCardModal();
        requestAnimationFrame(() => mCardSheet.classList.remove('translate-y-full'));
      }

      function closeCardModal() {
        mCardSheet.classList.add('translate-y-full');
        setTimeout(() => mCard.classList.add('hidden'), 300);
      }

      document.getElementById('btn-add-card').addEventListener('click', openCardModal);
      document.getElementById('close-card-modal').addEventListener('click', closeCardModal);
      mCardBg.addEventListener('click', closeCardModal);

      // Simple formatting for card number
      document.getElementById('input-card-number').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(.{4})/g, '$1 ').trim();
        e.target.value = v;
        validateCardModal();
      });

      // Simple formatting for expiry date
      document.getElementById('input-card-expiry').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 2) v = v.slice(0,2) + '/' + v.slice(2,4);
        e.target.value = v;
        validateCardModal();
      });

      const mCardInputs = ['input-card-number', 'input-card-owner', 'input-card-expiry'];
      const mCardSaveBtn = document.getElementById('save-card-btn');

      function validateCardModal() {
        const num = document.getElementById('input-card-number').value.replace(/\D/g, '');
        const own = document.getElementById('input-card-owner').value;
        const exp = document.getElementById('input-card-expiry').value;
        if (num.length >= 15 && own.length > 3 && exp.length === 5) {
          mCardSaveBtn.disabled = false;
        } else {
          mCardSaveBtn.disabled = true;
        }
      }

      document.getElementById('input-card-owner').addEventListener('input', validateCardModal);

      mCardSaveBtn.addEventListener('click', () => {
        savedMethod = {
          type: 'card',
          data: {
            number: document.getElementById('input-card-number').value,
            owner: document.getElementById('input-card-owner').value,
            expiry: document.getElementById('input-card-expiry').value
          }
        };
        localStorage.setItem('pp_agent_cashout_method_v2', JSON.stringify(savedMethod));

  mCardSaveBtn.innerHTML = `<i class="fas fa-check"></i> ${t('cashout_linked', 'Vinculada')}`;
  mCardSaveBtn.classList.replace('bg-[color:var(--pp-primary)]', 'bg-emerald-600');

        setTimeout(() => {
          mCardSaveBtn.innerHTML = `<span data-i18n="cashout_link_card">Vincular tarjeta</span>`;
          mCardSaveBtn.classList.replace('bg-emerald-600', 'bg-[color:var(--pp-primary)]');
          closeCardModal();
          renderState();
        }, 600);
      });

      document.getElementById('btn-edit-bank').addEventListener('click', () => {
         // Determine which modal to open based on current method
         if (savedMethod && savedMethod.type === 'card') {
           openCardModal();
         } else {
           openBankModal();
         }
      });

      renderState();
    })();
  </script>
  <script src="../chat-widget.js"></script>
</body>
</html>
