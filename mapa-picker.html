<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ubicar en mapa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
    .bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; }
    .bar h2 { font-size: 1rem; font-weight: 700; color: #1e293b; }
    .bar .coords { font-size: 11px; color: #64748b; margin-right: 12px; }
    .bar button { padding: 8px 20px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; background: #5462e6; color: #fff; }
    .bar button:hover { background: #4352d4; }
    #mapa { flex: 1; min-height: 200px; background: #e2e8f0; position: relative; }
    /* Solo los tiles: evitar que se deformen. NO tocar el ícono del marcador */
    #mapa .leaflet-tile-container img { max-width: none !important; max-height: none !important; width: 256px !important; height: 256px !important; }
  </style>
</head>
<body>
  <div class="bar">
    <div>
      <h2>Coloque el marcador en el lugar donde desea activar el servicio</h2>
      <p style="font-size:11px;color:#64748b;margin-top:4px">Si tiene varias sucursales, indique la oficina principal.</p>
    </div>
    <div class="bar-right" style="display:flex;align-items:center;gap:8px">
      <button type="button" id="btnMyLocation" class="btn-sec" style="padding:6px 12px;border-radius:8px;border:1px solid #e2e8f0;background:#f8fafc;color:#1e293b;font-size:12px;cursor:pointer"><i class="fa-solid fa-location-crosshairs" style="margin-right:4px"></i>Mi ubicación</button>
      <span class="coords" id="coordsDisplay">8.994500, -79.519900</span>
      <button type="button" id="btnListo">Listo</button>
    </div>
  </div>
  <div id="mapa"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
  <script>
    (function() {
      var params = {};
      (location.search || '').slice(1).split('&').forEach(function(p) {
        var kv = p.split('=');
        if (kv[0]) params[kv[0]] = decodeURIComponent((kv[1] || '').replace(/\+/g, ' '));
      });
      var lat = parseFloat(params.lat) || 8.9945;
      var lng = parseFloat(params.lng) || -79.5199;
      if (isNaN(lat)) lat = 8.9945;
      if (isNaN(lng)) lng = -79.5199;

      var map, marker, updateCoords;
      try {
        map = L.map('mapa', { preferCanvas: false }).setView([lat, lng], 14);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}' + (L.Browser.retina ? '@2x.png' : '.png'), {
          attribution: '© OSM © CARTO',
          subdomains: 'abcd',
          maxZoom: 19
        }).addTo(map);
        var storeIcon = L.icon({ iconUrl: 'pin-tienda.png', iconSize: [62, 94], iconAnchor: [31, 94], popupAnchor: [0, -94] });
        marker = L.marker([lat, lng], { draggable: true, icon: storeIcon }).addTo(map);
        setTimeout(function() { if (map) map.invalidateSize(); }, 100);
      } catch (e) { marker = null; map = null; }

      var coordsEl = document.getElementById('coordsDisplay');
      updateCoords = function() {
        if (marker && coordsEl) coordsEl.textContent = marker.getLatLng().lat.toFixed(6) + ', ' + marker.getLatLng().lng.toFixed(6);
      };
      if (marker) { marker.on('dragend', updateCoords); updateCoords(); }

      var btnListo = document.getElementById('btnListo');
      if (btnListo) {
        btnListo.onclick = function() {
          var pos = marker ? marker.getLatLng() : { lat: lat, lng: lng };
          var latVal = typeof pos.lat === 'number' ? pos.lat : parseFloat(pos.lat) || lat;
          var lngVal = typeof pos.lng === 'number' ? pos.lng : parseFloat(pos.lng) || lng;
          try {
            if (window.parent !== window) {
              if (typeof window.parent.__obReceiveMapCoords === 'function') {
                try {
                  window.parent.__obReceiveMapCoords(latVal, lngVal);
                } catch (e) {}
              } else {
                window.parent.postMessage({ type: 'mapa-picker-done', lat: latVal, lng: lngVal }, '*');
              }
              try {
                window.parent.location.hash = 'mapa-done-' + latVal + ',' + lngVal;
              } catch (e) {}
            } else {
              var txt = latVal.toFixed(6) + ', ' + lngVal.toFixed(6);
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(txt).then(function() {
                  alert('Coordenadas copiadas: ' + txt + '\n\nPara guardarlas en el formulario, abra onboarding.html, vaya al paso Dirección y haga clic en "Abrir mapa". Dentro del mapa, haga clic en "Listo".');
                }).catch(function() {
                  alert('Coordenadas: ' + txt + '\n\nCópielas manualmente. Para usarlas en el formulario, abra onboarding.html → Dirección → "Abrir mapa" → "Listo".');
                });
              } else {
                alert('Coordenadas: ' + txt + '\n\nPara guardarlas en el formulario, abra onboarding.html, vaya al paso Dirección y haga clic en "Abrir mapa".');
              }
            }
          } catch (err) {
            alert('Error: ' + (err.message || 'No se pudo enviar'));
          }
        };
      }

      function movePinTo(lat, lng) {
        if (!marker || !map) return;
        var p = [lat, lng];
        marker.setLatLng(p);
        map.setView(p, 17);
        updateCoords();
      }
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(navigator.userAgent) || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
      var btnMyLoc = document.getElementById('btnMyLocation');
      if (btnMyLoc && map && marker) {
        btnMyLoc.onclick = function() {
          var self = this;
          self.disabled = true;
          function done() { self.disabled = false; }
          function tryIp() {
            fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(d){
              var la = d.latitude, ln = d.longitude;
              if (la != null && ln != null) { movePinTo(la, ln); done(); return null; }
              return fetch('https://reallyfreegeoip.org/json/').then(function(r2){return r2.json();});
            }).then(function(d2){
              if (d2) {
                var la = d2.latitude != null ? d2.latitude : d2.lat, ln = d2.longitude != null ? d2.longitude : d2.lon;
                if (la != null && ln != null) movePinTo(la, ln);
              }
              done();
            }).catch(function(){ done(); });
          }
          if (!isMobile) {
            tryIp();
            return;
          }
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              function(pos) {
                movePinTo(pos.coords.latitude, pos.coords.longitude);
                done();
              },
              tryIp,
              { timeout: 5000, maximumAge: 60000 }
            );
          } else {
            tryIp();
          }
        };
      }
    })();
  </script>
  <script src="modules.config.js"></script>
  <script src="auth.js"></script>
  <script src="demo-context.js"></script>
</body>
</html>
