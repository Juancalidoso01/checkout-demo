<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Test Mapa Leaflet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin>
  <style>
    body { margin: 20px; font-family: system-ui, sans-serif; }
    #mapa { width: 100%; height: 400px; background: #e2e8f0; }
    img { max-width: 100%; height: auto; } /* Simular el styles.css global */
  </style>
</head>
<body>
  <h1>Test Mapa</h1>
  <p>Si ves el mapa de Panamá con calles, funciona. Si ves gris, hay un problema.</p>
  <div id="mapa"></div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
  <script>
    window.addEventListener('load', function() {
      // Override para tiles
      var style = document.createElement('style');
      style.textContent = '#mapa img{max-width:none !important;max-height:none !important}';
      document.head.appendChild(style);
      var map = L.map('mapa').setView([8.9945, -79.5199], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
      L.marker([8.9945, -79.5199]).addTo(map);
    });
  </script>
</body>
</html>
