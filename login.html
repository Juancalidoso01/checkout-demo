<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0047bb">
  <title>Iniciar sesión — Punto Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body{background:#f3f4f6;font-family:var(--pp-font,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif);color:var(--pp-text,#171717)}
    .bg-punto-pago{background:#0047bb}
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="bg-punto-pago text-white p-4 shadow-lg sticky top-0 z-40 pp-type">
    <div class="mx-auto flex justify-between items-center w-full max-w-5xl px-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="bg-white rounded-md shadow-sm flex items-center justify-center w-[150px] h-11 md:h-12 px-2">
          <img src="assets/logo-header-v2.png" alt="Punto Pago" class="h-7 md:h-8 w-auto max-w-[136px] object-contain">
        </div>
        <span class="text-lg md:text-xl font-extrabold tracking-wide uppercase whitespace-nowrap" data-i18n="login_header" data-i18n="login_header">Acceso</span>
      </div>
      <div class="text-xs text-white/80 hidden md:block" data-i18n="login_demo_badge" data-i18n="login_demo_badge">Demo de banca en línea (roles)</div>
    </div>
  </nav>

  <main class="pp-page flex-grow">
    <div class="pp-shell">
      <div class="max-w-md mx-auto">
        <section class="pp-card -soft overflow-hidden">
          <div class="pp-card-head">
            <h1 class="text-2xl font-extrabold pp-type" data-i18n="login_title">Iniciar sesión</h1>
            <p class="text-sm text-gray-500" data-i18n="login_subtitle" data-i18n="login_subtitle">Ingresa tus credenciales para continuar.</p>
          </div>
          <div class="pp-card-body space-y-4">

            <div>
              <label class="pp-label" data-i18n="login_lbl_user">Usuario</label>
              <input id="username" type="text" class="pp-field" autocomplete="username" placeholder="Ej: agente01">
            </div>

            <div>
              <label class="pp-label" data-i18n="login_lbl_pwd">Contraseña</label>
              <input id="password" type="password" class="pp-field" autocomplete="current-password" placeholder="••••">
            </div>

            <button id="loginBtn" type="button" class="pp-btn pp-btn-primary -full" data-i18n="login_btn_enter" data-i18n="login_btn_enter">Entrar</button>

            <p id="error" class="text-sm text-red-600 hidden"></p>

            <details class="text-xs text-gray-500">
              <summary class="cursor-pointer" data-i18n="login_demo_users" data-i18n="login_demo_users">Usuarios demo</summary>
              <div class="mt-2 space-y-1">
                <div><strong>superadmin</strong> / <code>admin123</code></div>
                <div><strong>agente01</strong> / <code>1234</code></div>
                <div><strong>empleado01</strong> / <code>1234</code></div>
              </div>
            </details>

          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const next = params.get('next');

      // If already logged in, go where appropriate
      const existing = window.PPAuth.getSession();
      if (existing) window.PPAuth.redirectAfterLogin(next);

      const $u = document.getElementById('username');
      const $p = document.getElementById('password');
      const $btn = document.getElementById('loginBtn');
      const $err = document.getElementById('error');

      function showError(msg){
        $err.textContent = msg;
        $err.classList.toggle('hidden', !msg);
      }

      function doLogin(){
        showError('');
        const res = window.PPAuth.signIn($u.value, $p.value);
        if (!res.ok){
          // Prefer localized message via errorKey, then res.error, then generic fallback
          let msg = '';
          try {
            const dict = window.I18N && window.I18N.getDict ? window.I18N.getDict() : null;
            if (res.errorKey && dict && dict[res.errorKey]) msg = dict[res.errorKey];
            else if (res.error) msg = res.error;
            else if (dict && dict.login_err_generic) msg = dict.login_err_generic;
          } catch(e){}
          if (!msg) msg = 'No fue posible iniciar sesión.';
          showError(msg);
          return;
        }
        window.PPAuth.redirectAfterLogin(next);
      }

      $btn.addEventListener('click', doLogin);
      [$u,$p].forEach(el => el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ doLogin(); } }));
      setTimeout(()=>{ try { $u.focus(); } catch(e){} }, 100);
    })();
  </script>
  <script src="i18n.js?v=7"></script>
</body>
</html>
