<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0047bb">
  <title>Punto Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body{background:#f3f4f6;font-family:var(--pp-font,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif);color:var(--pp-text,#171717)}
    .bg-punto-pago{background:linear-gradient(135deg,var(--pp-primary,#5462e6),var(--pp-primary-900,#3738ab))}
    .login-lang-select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:14px;padding:.6rem 2.2rem .6rem .85rem;appearance:none;-webkit-appearance:none;-moz-appearance:none;font-size:.875rem;font-weight:700;line-height:1.2;outline:none}
    .login-lang-select option{color:#111827}
    .login-brand-chip{background:rgba(255,255,255,.96);border:1px solid rgba(255,255,255,.5);box-shadow:0 14px 34px rgba(55,56,171,.16)}
    .login-hero{background:linear-gradient(180deg, rgba(84,98,230,.08), rgba(255,255,255,0) 220px)}
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="bg-punto-pago text-white p-4 shadow-lg sticky top-0 z-40 pp-type">
    <div class="mx-auto flex justify-between items-center w-full max-w-5xl px-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="login-brand-chip rounded-2xl flex items-center justify-center w-[172px] h-12 md:h-[54px] px-4">
          <img src="assets/logo-header.png" alt="Punto Pago" class="h-8 md:h-9 w-auto max-w-[148px] object-contain">
        </div>
        <span class="text-lg md:text-xl font-extrabold tracking-wide uppercase whitespace-nowrap" data-i18n="login_header">Acceso</span>
      </div>
      <div class="flex items-center gap-3 shrink-0">
        <label for="lang-selector-login" class="sr-only" data-i18n="setup_language">Idioma</label>
        <div class="relative">
          <select id="lang-selector-login" class="login-lang-select">
            <option value="es" data-i18n="lang_es">Español</option>
            <option value="en" data-i18n="lang_en">Inglés</option>
            <option value="ru" data-i18n="lang_ru">Ruso</option>
            <option value="zh" data-i18n="lang_zh">Chino</option>
          </select>
          <i class="fas fa-chevron-down text-xs text-white/80 pointer-events-none absolute right-3 top-1/2 -translate-y-1/2"></i>
        </div>
        <div class="text-xs text-white/80 hidden md:block" data-i18n="login_demo_badge">Demo de banca en línea (roles)</div>
      </div>
    </div>
  </nav>

  <main class="pp-page login-hero flex-grow">
    <div class="pp-shell">
      <div class="max-w-md mx-auto">
        <section class="pp-card -soft overflow-hidden">
          <div class="pp-card-head">
            <div class="mb-4 rounded-[28px] border border-[rgba(84,98,230,.12)] bg-[rgba(84,98,230,.05)] px-4 py-4">
              <div class="flex items-center gap-3">
                <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white shadow-sm border border-[rgba(84,98,230,.12)]">
                  <img src="assets/logo.png" alt="Punto Pago" class="h-7 w-7 object-contain">
                </div>
                <div>
                  <div class="text-xs font-extrabold uppercase tracking-[0.18em] text-[var(--pp-primary)]">Punto Pago</div>
                  <div class="text-sm text-gray-500" data-i18n="login_demo_badge">Demo de banca en línea (roles)</div>
                </div>
              </div>
            </div>
            <h1 class="text-2xl font-extrabold pp-type" data-i18n="login_title">Iniciar sesión</h1>
            <p class="text-sm text-gray-500" data-i18n="login_subtitle">Ingresa tus credenciales para continuar.</p>
          </div>
          <div class="pp-card-body space-y-4">

            <div>
              <label class="pp-label" data-i18n="login_lbl_user">Usuario</label>
              <input id="username" type="text" class="pp-field" autocomplete="username" placeholder="Ej: agente01" data-i18n-ph="login_ph_user">
            </div>

            <div>
              <label class="pp-label" data-i18n="login_lbl_pwd">Contraseña</label>
              <input id="password" type="password" class="pp-field" autocomplete="current-password" placeholder="••••" data-i18n-ph="login_ph_pwd">
            </div>

            <button id="loginBtn" type="button" class="pp-btn pp-btn-primary -full" data-i18n="login_btn_enter">Entrar</button>

            <p id="error" class="text-sm text-red-600 hidden"></p>

            <details class="text-xs text-gray-500">
              <summary class="cursor-pointer" data-i18n="login_demo_users">Usuarios demo</summary>
              <div class="mt-2 space-y-1">
                <div><strong>superadmin</strong> / <code>admin123</code></div>
                <div><strong>agente01</strong> / <code>1234</code></div>
                <div><strong>empleado01</strong> / <code>1234</code></div>
              </div>
            </details>

          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    (function(){
      const params = new URLSearchParams(location.search);
      const next = params.get('next');

      // If already logged in, go where appropriate
      const existing = window.PPAuth.getSession();
      if (existing) window.PPAuth.redirectAfterLogin(next);

      const $u = document.getElementById('username');
      const $p = document.getElementById('password');
      const $btn = document.getElementById('loginBtn');
      const $err = document.getElementById('error');

      function showError(msg){
        $err.textContent = msg;
        $err.classList.toggle('hidden', !msg);
      }

      function doLogin(){
        showError('');
        const res = window.PPAuth.signIn($u.value, $p.value);
        if (!res.ok){
          // Prefer localized message via errorKey, then res.error, then generic fallback
          let msg = '';
          try {
            const dict = window.I18N && window.I18N.getDict ? window.I18N.getDict() : null;
            if (res.errorKey && dict && dict[res.errorKey]) msg = dict[res.errorKey];
            else if (res.error) msg = res.error;
            else if (dict && dict.login_err_generic) msg = dict.login_err_generic;
          } catch(e){}
          if (!msg) msg = (window.I18N && window.I18N.getDict && window.I18N.getDict().login_err_generic) || 'No fue posible iniciar sesión.';
          showError(msg);
          return;
        }
        window.PPAuth.redirectAfterLogin(next);
      }

      $btn.addEventListener('click', doLogin);
      [$u,$p].forEach(el => el.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ doLogin(); } }));
      setTimeout(()=>{ try { $u.focus(); } catch(e){} }, 100);

      function syncTitle(){
        try {
          const dict = window.I18N && window.I18N.getDict ? window.I18N.getDict() : null;
          document.title = `${(dict && dict.login_title) || 'Iniciar sesión'} — Punto Pago`;
        } catch(e){}
      }

      function setupLangSelector(){
        const langSel = document.getElementById('lang-selector-login');
        if (!langSel || !window.I18N) return;
        langSel.value = window.I18N.currentLang || localStorage.getItem('pp_lang') || 'es';
        langSel.addEventListener('change', (e) => {
          window.I18N.setLanguage(e.target.value);
          syncTitle();
        });
        document.addEventListener('languageChanged', () => {
          langSel.value = window.I18N.currentLang || 'es';
        });
      }

      syncTitle();
      setupLangSelector();
      document.addEventListener('languageChanged', syncTitle);
    })();
  </script>
  <script src="i18n.js?v=7"></script>
</body>
</html>
